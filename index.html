<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>느린아이 시계 보기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --warm-700:#4A4035;--warm-800:#2E261D;
  --warm-400:#B8AD9E;--warm-500:#8C8070;--warm-600:#6B5F50;
  --border:#E8E2DA;--border-light:#F0ECE6;
  --blue:#6BADE8;--orange:#F0A050;--green:#5BC886;--red:#F07070;
  --bg:#F5F1EB;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);min-height:100dvh;display:flex;justify-content:center;align-items:flex-start;user-select:none;-webkit-tap-highlight-color:transparent;color:var(--warm-700);}
.hidden{display:none!important;}
.app{width:100%;max-width:480px;min-height:100dvh;background:#fff;padding:24px 20px;padding-top:max(24px,env(safe-area-inset-top));padding-bottom:max(24px,env(safe-area-inset-bottom));display:flex;flex-direction:column;align-items:center;}
@media(min-width:768px){body{align-items:center;padding:32px;}.app{max-width:560px;min-height:auto;border-radius:32px;box-shadow:0 8px 48px rgba(0,0,0,.07),0 1px 4px rgba(0,0,0,.04);padding:44px 40px;}}

/* ── Login ── */
.login-view{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;min-height:100dvh;padding:40px 20px;width:100%;}
.login-logo-area{text-align:center;margin-bottom:48px;}
.login-logo-area h1{font-size:1.875rem;font-weight:900;letter-spacing:-.025em;margin-top:8px;}
.login-subtitle{color:var(--warm-400);font-size:.9375rem;margin-top:4px;}
@keyframes floatBubble{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.login-trial{position:relative;background:#FFF8F0;border:1.5px solid #EDD080;border-radius:14px;padding:9px 16px;font-size:.78rem;color:#7B6545;font-weight:600;text-align:center;margin-bottom:24px;line-height:1.4;box-shadow:0 4px 14px rgba(220,160,50,.18);animation:floatBubble 2.8s ease-in-out infinite;align-self:center;}
.login-trial::before{content:'';position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top:8px solid #EDD080;border-bottom:0;}
.login-trial::after{content:'';position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);border:4px solid transparent;border-top:7px solid #FFF8F0;border-bottom:0;z-index:1;}
.login-buttons{width:100%;max-width:320px;display:flex;flex-direction:column;gap:12px;}
.login-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:14px 20px;border-radius:12px;border:none;font-size:.9375rem;font-weight:600;font-family:inherit;cursor:pointer;transition:transform .1s;}
.login-btn:active{transform:scale(.97);}
.login-btn svg{flex-shrink:0;}
.login-btn.kakao{background:#FEE500;color:#191919;}
.login-btn.naver{background:#03C75A;color:#fff;}
.login-btn.google{background:#fff;color:#444;border:1.5px solid #DADCE0;}
.login-btn.facebook{background:#1877F2;color:#fff;}

/* ── Start View ── */
#start-view{width:100%;display:flex;flex-direction:column;align-items:center;}
.brand{display:flex;flex-direction:column;align-items:center;margin-bottom:20px;position:relative;width:100%;}
.brand h1{font-size:1.6rem;font-weight:900;letter-spacing:-.025em;margin-top:8px;}
.brand-sub{font-size:.8rem;color:var(--warm-400);margin-bottom:0;font-weight:500;}
.share-btn{position:absolute;top:0;right:0;background:#fff;border:2px solid var(--border);border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--warm-500);}

/* Clock Type Sections */
.clock-sections{width:100%;display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.clock-type-section{width:100%;background:#fff;border:2px solid var(--border);border-radius:20px;padding:16px;}
.clock-type-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:10px;border-bottom:1.5px solid var(--border-light);}
.clock-type-icon{font-size:1.25rem;line-height:1;}
.clock-type-title{font-size:1.1rem;font-weight:900;color:var(--warm-700);}
.sub-mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.sub-mode-btn{display:flex;flex-direction:column;align-items:center;padding:12px 8px 10px;border:2px solid var(--border);border-radius:14px;background:#FDFCFA;cursor:pointer;font-family:inherit;transition:all .12s;gap:6px;width:100%;}
.sub-mode-btn:hover,.sub-mode-btn:active{background:#EEF6FD;border-color:var(--blue);}
.sub-preview{height:56px;display:flex;align-items:center;justify-content:center;}
.sub-mode-label{font-size:.9rem;font-weight:700;color:var(--warm-700);}

/* ── Settings ── */
.settings-section{width:100%;border-top:1.5px solid var(--border-light);padding-top:16px;margin-top:4px;}
.setting-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.setting-label{font-size:.875rem;font-weight:600;color:var(--warm-700);}
.setting-desc{font-size:.75rem;color:var(--warm-400);margin-top:2px;}
.toggle-track{width:48px;height:28px;border-radius:99px;position:relative;background:#E0DAD0;border:none;cursor:pointer;flex-shrink:0;transition:background .2s;}
.toggle-track.on{background:#5BC886;}
.toggle-knob{width:22px;height:22px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;box-shadow:0 1px 4px rgba(0,0,0,.12);transition:transform .2s;}
.toggle-track.on .toggle-knob{transform:translateX(20px);}
.impulse-mode-options{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.impulse-mode-btn{display:flex;flex-direction:column;align-items:center;padding:10px 8px;border-radius:14px;border:2px solid var(--border);background:#fff;cursor:pointer;transition:all .15s;font-family:inherit;}
.impulse-mode-btn.selected{border-color:#C4AA82;background:#FAF5EE;}
.impulse-mode-icon{font-size:1.2rem;margin-bottom:2px;}
.impulse-mode-label{font-size:.8rem;font-weight:700;color:var(--warm-700);}
.impulse-mode-desc{font-size:.65rem;color:var(--warm-400);margin-top:1px;}
.imp-sec-row{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;}
.imp-sec{flex:0 0 calc((100% - 16px)/5);padding:8px 0;font-size:.7rem;font-weight:600;border-radius:10px;border:2px solid var(--border);background:#fff;color:#8C8070;cursor:pointer;font-family:inherit;transition:all .15s;text-align:center;}
.imp-sec.active{border-color:#C4AA82;background:#FAF5EE;color:#7B6545;}
#impulse-details{display:none;}
.logout-btn{background:none;border:1.5px solid var(--border);border-radius:8px;padding:6px 14px;font-size:.75rem;font-weight:600;color:var(--warm-400);cursor:pointer;font-family:inherit;margin-top:20px;display:none;}
.logout-btn:hover{background:var(--bg);}

/* ── Play View ── */
#play-view{width:100%;display:flex;flex-direction:column;align-items:center;}
.play-header{display:flex;align-items:center;gap:12px;width:100%;margin-bottom:14px;}
.btn-home{width:36px;height:36px;border-radius:10px;border:2px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--warm-500);flex-shrink:0;padding:0;}
.play-middle{flex:1;display:flex;flex-direction:column;gap:4px;}
.play-progress-label{font-size:.8rem;font-weight:600;color:var(--warm-500);}
.play-progress-bar{width:100%;height:6px;background:var(--border-light);border-radius:3px;overflow:hidden;}
.play-progress-fill{height:100%;border-radius:3px;background:var(--blue);transition:width .3s;}
.play-score{font-size:.85rem;font-weight:700;color:var(--green);flex-shrink:0;}
.game-container{background:#fff;border:2px solid var(--border);border-radius:20px;padding:16px 10px 14px;width:100%;display:flex;flex-direction:column;align-items:center;}
.question-prompt{font-size:1.3rem;font-weight:900;color:var(--warm-700);text-align:center;margin-bottom:14px;line-height:1.3;}

/* Clock scene */
.scene-area{width:100%;margin-bottom:14px;display:flex;justify-content:center;align-items:center;}
.scene-area svg{max-width:210px;max-height:210px;width:100%;}

/* Item cards — 2×2 grid for 4 time choices */
.compare-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;margin-bottom:12px;}
.item-card{border:2px solid var(--border);border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px 6px;background:#FDFCFA;cursor:pointer;transition:border-color .15s,background .15s,transform .1s;}
.item-card:hover{border-color:var(--blue);background:#EEF6FD;}
.item-card:active{transform:scale(.96);}
.item-card.card-correct{border-color:#5BC886!important;background:#D4F5E0!important;}
.item-card.card-wrong{border-color:#F07070!important;background:#FDE8E8!important;opacity:.6;}
.item-card.card-locked{pointer-events:none;}
.time-label{font-size:1.25rem;font-weight:900;color:var(--warm-700);text-align:center;line-height:1.3;}
.mode-section-label{font-size:.875rem;font-weight:700;color:var(--warm-500);width:100%;text-align:left;padding:4px 0 8px;border-top:1.5px solid var(--border-light);margin-top:6px;}

.feedback{font-size:1rem;font-weight:700;text-align:center;padding:8px 0;min-height:38px;}
.feedback.correct{color:#5BC886;}
.feedback.wrong{color:#F07070;}

.btn-next-q{display:block;width:100%;max-width:360px;margin:6px auto 0;padding:14px 0;border-radius:16px;border:none;background:#4A4035;color:#fff;font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(74,64,53,.15);transition:background .15s,transform .1s;}
.btn-next-q:active{transform:scale(.98);background:#2E261D;}

.reveal-btn{display:block;width:100%;margin:6px auto;padding:14px 0;border-radius:14px;border:2px solid #C4AA82;background:#FAF5EE;color:#7B6545;font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer;text-align:center;}
.reveal-btn:active{background:#F0E6D6;transform:scale(.98);}
.delay-countdown{text-align:center;font-size:1.5rem;font-weight:900;color:#C4AA82;padding:12px 0;animation:pulse-count 1s ease infinite;}
#impulse-area{width:100%;}

/* Result View */
#result-view{width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center;padding:40px 0;}
.complete-overlay{position:relative;margin-top:40px;display:flex;flex-direction:column;align-items:center;gap:10px;}
.complete-emoji{font-size:56px;}
.complete-msg{font-size:1.25rem;font-weight:900;color:#4A4035;}
.complete-sub{font-size:.85rem;color:#B8AD9E;}
.next-btn{margin-top:8px;padding:14px 36px;border:none;border-radius:12px;background:#6BADE8;color:#fff;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;transition:transform .12s;}
.next-btn:active{transform:scale(.96);}

/* Splash */
.splash-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:9999;transition:opacity .5s ease-out;}
.splash-overlay.fade-out{opacity:0;pointer-events:none;}
.splash-logo{animation:splashFloat 2.4s ease-in-out infinite;margin-bottom:24px;}
.splash-title{font-size:2rem;font-weight:900;letter-spacing:-.025em;margin-bottom:8px;}
.splash-subtitle{color:#B8B0A8;font-size:.9375rem;font-weight:500;}
@keyframes splashFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@media(max-width:380px){.splash-title{font-size:1.5rem}}
@media(min-width:768px){.splash-logo svg{width:160px;height:134px}.splash-title{font-size:2.5rem}.splash-subtitle{font-size:1.0625rem}}
@keyframes popIn{0%{transform:scale(.8);opacity:.5}45%{transform:scale(1.15)}65%{transform:scale(.92)}80%{transform:scale(1.05)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes pulse-count{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.15);opacity:.7}}
</style>
</head>

<script>
/* ══ 상수 ══ */
const Q_PER_GAME = 10;
const MODE_MINUTES = {
  hour:          [0],
  half:          [30],
  quarter:       [15],
  three_quarter: [45],
  random:        [0, 15, 30, 45]
};

/* ══ 상태 ══ */
let curMode, curDisplayType, curQuestions, qIdx, score, curQ, locked;
let ttsOn = true, impulsePrevention = true, impulseMode = 'hide', impulseDelay = 5;
let delayTimer = null;

/* ══ 시계 SVG 그리기 ══ */
function clockHand(cx, cy, angleDeg, len, backLen, width, color) {
  const a = angleDeg * Math.PI / 180;
  const p = a + Math.PI / 2;
  const hw = width / 2;
  const tx = (cx + Math.cos(a) * len).toFixed(2);
  const ty = (cy + Math.sin(a) * len).toFixed(2);
  const bx = (cx - Math.cos(a) * backLen).toFixed(2);
  const by = (cy - Math.sin(a) * backLen).toFixed(2);
  const l1x = (cx + Math.cos(p) * hw).toFixed(2);
  const l1y = (cy + Math.sin(p) * hw).toFixed(2);
  const l2x = (cx - Math.cos(p) * hw).toFixed(2);
  const l2y = (cy - Math.sin(p) * hw).toFixed(2);
  return `<polygon points="${tx},${ty} ${l1x},${l1y} ${bx},${by} ${l2x},${l2y}" fill="${color}" opacity="0.95"/>`;
}

function clockSVG(h, m, isSmall, customSz) {
  const sz = customSz !== undefined ? customSz : (isSmall ? 56 : 220);
  const cx = sz / 2, cy = sz / 2;
  const R = sz / 2 - (isSmall ? 1 : 2);
  const fR = R - (isSmall ? 4 : 10);
  const nR = fR - (isSmall ? 8 : 18);

  const hAng = ((h % 12) * 60 + m) / 720 * 360 - 90;
  const mAng = m / 60 * 360 - 90;

  /* Tick marks */
  let ticks = '';
  for (let i = 0; i < 60; i++) {
    const a = (i * 6 - 90) * Math.PI / 180;
    const isH = i % 5 === 0;
    const r1 = fR - (isH ? (isSmall ? 4 : 12) : (isSmall ? 2 : 6));
    const x1 = (cx + Math.cos(a) * r1).toFixed(2);
    const y1 = (cy + Math.sin(a) * r1).toFixed(2);
    const x2 = (cx + Math.cos(a) * fR).toFixed(2);
    const y2 = (cy + Math.sin(a) * fR).toFixed(2);
    const sw = isH ? (isSmall ? 1.5 : 2.5) : (isSmall ? 0.8 : 1.2);
    const col = isH ? '#777' : '#CCC';
    ticks += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${col}" stroke-width="${sw}" stroke-linecap="round"/>`;
  }

  /* Numbers */
  let nums = '';
  if (!isSmall) {
    for (let i = 1; i <= 12; i++) {
      const a = (i * 30 - 90) * Math.PI / 180;
      const nx = (cx + Math.cos(a) * nR).toFixed(2);
      const ny = (cy + Math.sin(a) * nR).toFixed(2);
      nums += `<text x="${nx}" y="${ny}" text-anchor="middle" dominant-baseline="central" font-size="18" font-weight="700" fill="#333" font-family="'Noto Sans KR',sans-serif">${i}</text>`;
    }
  }

  /* Hand dimensions */
  const hLen   = fR * (isSmall ? 0.50 : 0.52);
  const mLen   = fR * (isSmall ? 0.72 : 0.76);
  const hBack  = fR * 0.12;
  const mBack  = fR * 0.10;
  const hW     = sz * (isSmall ? 0.065 : 0.040);
  const mW     = sz * (isSmall ? 0.040 : 0.026);
  const dotR   = (sz * 0.032).toFixed(2);
  const dotR2  = (sz * 0.016).toFixed(2);

  return `<svg viewBox="0 0 ${sz} ${sz}" width="${isSmall ? sz : '100%'}" height="${isSmall ? sz : '100%'}" xmlns="http://www.w3.org/2000/svg"${isSmall ? '' : ' style="max-width:210px;max-height:210px;"'}>
  <circle cx="${cx}" cy="${cy}" r="${R}" fill="#A8D8EE"/>
  <circle cx="${cx}" cy="${cy}" r="${fR}" fill="white"/>
  <circle cx="${cx}" cy="${cy}" r="${fR}" fill="none" stroke="#6BADE8" stroke-width="${isSmall ? 1.5 : 2.5}"/>
  ${ticks}
  ${nums}
  ${clockHand(cx, cy, mAng, mLen, mBack, mW, '#E05050')}
  ${clockHand(cx, cy, hAng, hLen, hBack, hW, '#3A9B6A')}
  <circle cx="${cx}" cy="${cy}" r="${dotR}" fill="#6BADE8"/>
  <circle cx="${cx}" cy="${cy}" r="${dotR2}" fill="white"/>
</svg>`;
}

/* ══ 시간 포맷 ══ */
function formatTime(h, m) {
  if (m === 0) return `${h}시`;
  return `${h}시 ${m}분`;
}
function formatDigital(h, m) {
  return `${h}:${String(m).padStart(2, '0')}`;
}

/* ══ 전자 알람시계 아이콘 SVG (헤더용) ══ */
function digitalAlarmSVG(h, m) {
  const txt = formatDigital(h, m);
  return `<svg viewBox="0 0 80 62" width="68" height="53" xmlns="http://www.w3.org/2000/svg">

  <rect x="4" y="9" width="70" height="44" rx="8" fill="#4A4035"/>
  <rect x="7" y="10" width="64" height="9" rx="5" fill="white" opacity="0.07"/>

  <rect x="13" y="18" width="54" height="22" rx="3" fill="#98E6A0"/>
  <rect x="14" y="19" width="26" height="5" rx="2" fill="white" opacity="0.18"/>
  <text x="40" y="29.5" text-anchor="middle" dominant-baseline="central"
        font-family="'Courier New',monospace" font-size="16" font-weight="900"
        fill="#0C3B18" letter-spacing="3">${txt}</text>
  <circle cx="16" cy="8" r="6.5" fill="#3A3028" stroke="#2A2018" stroke-width="1"/>

  <circle cx="64" cy="8" r="6.5" fill="#3A3028" stroke="#2A2018" stroke-width="1"/>
  <circle cx="64" cy="8" r="3" fill="#2A2018"/>
  <path d="M60 5.5 Q64 2.5 68 5.5" fill="none" stroke="#5A5040" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="28" y="5" width="24" height="7" rx="3.5" fill="#3A3028" stroke="#2A2018" stroke-width="0.5"/>
  <rect x="11" y="51" width="18" height="9" rx="4.5" fill="#3A3028"/>
  <rect x="51" y="51" width="18" height="9" rx="4.5" fill="#3A3028"/>
</svg>`;
}

/* ══ 전자 시계 SVG ══ */
function digitalClockSVG(h, m, isSmall) {
  const txt = formatDigital(h, m);
  if (isSmall) {
    return `<svg viewBox="0 0 64 30" width="64" height="30" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="64" height="30" rx="6" fill="#3DA858"/>
  <rect x="5" y="4" width="54" height="22" rx="4" fill="white"/>
  <text x="32" y="15" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="900" font-family="monospace,'Courier New',sans-serif" fill="#1A1A1A" letter-spacing="1">${txt}</text>
</svg>`;
  } else {
    return `<svg viewBox="0 0 260 108" width="100%" style="max-width:260px;max-height:108px;" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="260" height="108" rx="14" fill="#3DA858"/>
  <rect x="10" y="10" width="240" height="88" rx="10" fill="white"/>
  <text x="130" y="54" text-anchor="middle" dominant-baseline="central" font-size="58" font-weight="900" font-family="monospace,'Courier New',sans-serif" fill="#1A1A1A" letter-spacing="4">${txt}</text>
</svg>`;
  }
}

/* ══ 모드 카드 미리보기 초기화 ══ */
function initPreviews() {
  const times = { hour:[1,0], half:[1,30], quarter:[1,15], three_quarter:[1,45] };
  for (const [mode, [h, m]] of Object.entries(times)) {
    const da = document.getElementById(`sprev-d-${mode}`);
    if (da) da.innerHTML = digitalClockSVG(h, m, true);
    const aa = document.getElementById(`sprev-a-${mode}`);
    if (aa) aa.innerHTML = clockSVG(h, m, true);
  }
}

/* ══ 바늘시계 헤더 아이콘 SVG (100×100 뷰박스, 비율 최적화) ══ */
function clockIconSVG(h, m) {
  const cx = 50, cy = 50;
  const hAng = ((h % 12) * 60 + m) / 720 * 360 - 90;
  const mAng = m / 60 * 360 - 90;
  let ticks = '';
  for (let i = 0; i < 12; i++) {
    const a = (i * 30 - 90) * Math.PI / 180;
    const r1 = i % 3 === 0 ? 35 : 38;
    ticks += `<line x1="${(cx+Math.cos(a)*r1).toFixed(1)}" y1="${(cy+Math.sin(a)*r1).toFixed(1)}" x2="${(cx+Math.cos(a)*41).toFixed(1)}" y2="${(cy+Math.sin(a)*41).toFixed(1)}" stroke="${i%3===0?'#666':'#C0C0C0'}" stroke-width="${i%3===0?2.5:1.2}" stroke-linecap="round"/>`;
  }
  let nums = '';
  for (let i = 1; i <= 12; i++) {
    const a = (i * 30 - 90) * Math.PI / 180;
    nums += `<text x="${(cx+Math.cos(a)*29).toFixed(1)}" y="${(cy+Math.sin(a)*29).toFixed(1)}" text-anchor="middle" dominant-baseline="central" font-size="9.5" font-weight="700" fill="#333" font-family="'Noto Sans KR',sans-serif">${i}</text>`;
  }
  function hand(ang, len, back, w, col) {
    const a = ang * Math.PI / 180, p = a + Math.PI / 2, hw = w / 2;
    const f = n => n.toFixed(2);
    const tx=cx+Math.cos(a)*len, ty=cy+Math.sin(a)*len;
    const bx=cx-Math.cos(a)*back, by=cy-Math.sin(a)*back;
    const l1x=cx+Math.cos(p)*hw, l1y=cy+Math.sin(p)*hw;
    const l2x=cx-Math.cos(p)*hw, l2y=cy-Math.sin(p)*hw;
    return `<polygon points="${f(tx)},${f(ty)} ${f(l1x)},${f(l1y)} ${f(bx)},${f(by)} ${f(l2x)},${f(l2y)}" fill="${col}" opacity="0.95"/>`;
  }
  return `<svg viewBox="0 0 100 100" width="56" height="56" xmlns="http://www.w3.org/2000/svg">
  <circle cx="50" cy="50" r="49" fill="#A8D8EE"/>
  <circle cx="50" cy="50" r="43" fill="white"/>
  <circle cx="50" cy="50" r="43" fill="none" stroke="#6BADE8" stroke-width="2"/>
  ${ticks}${nums}
  ${hand(mAng,34,4,2.5,'#E05050')}
  ${hand(hAng,22,5,4,'#3A9B6A')}
  <circle cx="50" cy="50" r="4" fill="#6BADE8"/>
  <circle cx="50" cy="50" r="1.8" fill="white"/>
</svg>`;
}

/* ══ 섹션 헤더 아이콘 초기화 ══ */
function initHeaderIcons() {
  const dig = document.getElementById('header-icon-digital');
  if (dig) dig.innerHTML = digitalAlarmSVG(3, 0);
  const ana = document.getElementById('header-icon-analog');
  if (ana) ana.innerHTML = clockIconSVG(10, 10);
}

/* ══ 문제 생성 ══ */
function rndInt(n) { return Math.floor(Math.random() * n); }
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = rndInt(i + 1);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildQuestions(mode) {
  const minsPool = MODE_MINUTES[mode];
  const qs = [];
  const used = new Set();

  while (qs.length < Q_PER_GAME) {
    const m = minsPool[rndInt(minsPool.length)];
    const h = rndInt(12) + 1;
    const key = `${h}:${m}`;
    if (used.has(key)) continue;
    used.add(key);

    /* Distractors: same minute, 3 different hours */
    const otherHours = shuffle(
      Array.from({length: 12}, (_, i) => i + 1).filter(x => x !== h)
    );
    let choices;
    if (mode === 'random') {
      /* Random mode: vary minutes too */
      const usedC = new Set([key]);
      choices = [{h, m}];
      let tries = 0;
      while (choices.length < 4 && ++tries < 200) {
        const dm = minsPool[rndInt(minsPool.length)];
        const dh = rndInt(12) + 1;
        const dk = `${dh}:${dm}`;
        if (!usedC.has(dk)) { usedC.add(dk); choices.push({h: dh, m: dm}); }
      }
    } else {
      choices = [
        {h, m},
        {h: otherHours[0], m},
        {h: otherHours[1], m},
        {h: otherHours[2], m}
      ];
    }
    choices = shuffle(choices);
    const correctIdx = choices.findIndex(c => c.h === h && c.m === m);
    qs.push({h, m, choices, correctIdx});
  }
  return qs;
}

/* ══ 뷰 전환 ══ */
function showView(id) {
  ['login-view', 'start-view', 'play-view', 'result-view'].forEach(v =>
    document.getElementById(v).classList.toggle('hidden', v !== id)
  );
  const lb = document.getElementById('logout-btn');
  if (lb) lb.style.display = id === 'start-view' && localStorage.getItem('slowmath_clock_login') ? 'block' : 'none';
}

/* ══ 로그인 ══ */
function socialLogin(provider) {
  localStorage.setItem('slowmath_clock_login', provider);
  showView('start-view');
}
function logout() {
  localStorage.removeItem('slowmath_clock_login');
  showView('login-view');
}
function goHome() {
  if (delayTimer) { clearInterval(delayTimer); delayTimer = null; }
  showView('start-view');
}

/* ══ 설정 ══ */
function saveSettings() {
  localStorage.setItem('slowmath_clock_settings', JSON.stringify(
    {ttsOn, impulsePrevention, impulseMode, impulseDelay}
  ));
}
function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem('slowmath_clock_settings'));
    if (!s) return;
    if (s.ttsOn !== undefined) ttsOn = s.ttsOn;
    if (s.impulsePrevention !== undefined) impulsePrevention = s.impulsePrevention;
    if (s.impulseMode) impulseMode = s.impulseMode;
    if (s.impulseDelay) impulseDelay = s.impulseDelay;
  } catch(e) {}
}
function applySettingsUI() {
  document.getElementById('tts-toggle').classList.toggle('on', ttsOn);
  document.getElementById('impulse-toggle').classList.toggle('on', impulsePrevention);
  document.getElementById('impulse-details').style.display = impulsePrevention ? 'block' : 'none';
  document.querySelectorAll('.impulse-mode-btn').forEach(b =>
    b.classList.toggle('selected', b.dataset.mode === impulseMode)
  );
  document.getElementById('impulse-delay-row').style.display = impulseMode === 'lock' ? '' : 'none';
  document.querySelectorAll('.imp-sec').forEach(b =>
    b.classList.toggle('active', parseInt(b.textContent) === impulseDelay)
  );
}
function toggleTTS() {
  ttsOn = !ttsOn;
  document.getElementById('tts-toggle').classList.toggle('on', ttsOn);
  saveSettings();
}
function toggleImpulse() {
  impulsePrevention = !impulsePrevention;
  document.getElementById('impulse-toggle').classList.toggle('on', impulsePrevention);
  document.getElementById('impulse-details').style.display = impulsePrevention ? 'block' : 'none';
  saveSettings();
}
function setImpulseMode(mode) {
  impulseMode = mode;
  document.querySelectorAll('.impulse-mode-btn').forEach(b =>
    b.classList.toggle('selected', b.dataset.mode === mode)
  );
  document.getElementById('impulse-delay-row').style.display = mode === 'lock' ? '' : 'none';
  saveSettings();
}
function setImpulseDelay(s) {
  impulseDelay = s;
  document.querySelectorAll('.imp-sec').forEach(b =>
    b.classList.toggle('active', parseInt(b.textContent) === s)
  );
  saveSettings();
}

/* ══ 공유 ══ */
function shareApp() {
  if (navigator.share) {
    navigator.share({title: '느린아이 시계 보기', url: location.href});
  } else {
    navigator.clipboard?.writeText(location.href);
    alert('링크가 복사됐어요!');
  }
}

/* ══ 게임 시작 ══ */
function startGame(mode, displayType) {
  curMode = mode;
  curDisplayType = displayType || 'analog';
  curQuestions = buildQuestions(mode);
  qIdx = 0;
  score = 0;
  document.getElementById('play-score').textContent = '0점';
  showView('play-view');
  renderQ();
}

/* ══ 문제 렌더링 ══ */
function renderQ() {
  locked = false;
  const q = curQuestions[qIdx];
  curQ = q;

  document.getElementById('q-label').textContent = `${qIdx + 1} / ${Q_PER_GAME}`;
  document.getElementById('progress-fill').style.width = `${(qIdx / Q_PER_GAME) * 100}%`;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('next-q-btn').classList.add('hidden');
  document.getElementById('impulse-area').innerHTML = '';

  document.getElementById('question-prompt').textContent = '몇 시 몇 분일까요?';
  document.getElementById('scene-area').innerHTML = curDisplayType === 'digital'
    ? digitalClockSVG(q.h, q.m, false)
    : clockSVG(q.h, q.m, false);

  const row = document.getElementById('compare-row');
  row.innerHTML = q.choices.map((c, i) =>
    `<div class="item-card" id="card-${i}" onclick="selectCard(${i})">
      <span class="time-label">${formatTime(c.h, c.m)}</span>
    </div>`
  ).join('');
  row.style.visibility = 'visible';

  if (impulsePrevention) applyImpulse();
}

/* ══ 충동방지 ══ */
function applyImpulse() {
  const row = document.getElementById('compare-row');
  const impulseArea = document.getElementById('impulse-area');
  if (impulseMode === 'hide') {
    row.style.visibility = 'hidden';
    const btn = document.createElement('button');
    btn.className = 'reveal-btn';
    btn.textContent = '보기 확인';
    btn.onclick = () => {
      row.style.visibility = 'visible';
      document.querySelectorAll('.item-card').forEach(c => c.style.pointerEvents = '');
      btn.remove();
    };
    impulseArea.appendChild(btn);
  } else {
    document.querySelectorAll('.item-card').forEach(c => c.style.pointerEvents = 'none');
    let remaining = impulseDelay;
    const cd = document.createElement('div');
    cd.className = 'delay-countdown';
    cd.textContent = remaining;
    impulseArea.appendChild(cd);
    delayTimer = setInterval(() => {
      remaining--;
      if (remaining <= 0) {
        clearInterval(delayTimer); delayTimer = null;
        cd.remove();
        document.querySelectorAll('.item-card').forEach(c => c.style.pointerEvents = '');
      } else {
        cd.textContent = remaining;
      }
    }, 1000);
  }
}

/* ══ 카드 선택 ══ */
function selectCard(idx) {
  if (locked) return;
  const correct = idx === curQ.correctIdx;
  const fb = document.getElementById('feedback');

  if (correct) {
    locked = true;
    document.getElementById(`card-${curQ.correctIdx}`).classList.add('card-correct');
    document.querySelectorAll('.item-card').forEach(c => c.classList.add('card-locked'));
    score++;
    fb.textContent = '정답!';
    fb.className = 'feedback correct';
    if (ttsOn) speak('정답');
    document.getElementById('play-score').textContent = `${score}점`;
    document.getElementById('next-q-btn').classList.remove('hidden');
  } else {
    document.getElementById(`card-${idx}`).classList.add('card-wrong', 'card-locked');
    fb.textContent = '다시 골라보세요';
    fb.className = 'feedback wrong';
    if (ttsOn) speak('다시 골라보세요');
  }
}

function onNextQ() {
  qIdx++;
  if (qIdx >= Q_PER_GAME) { showResult(); return; }
  renderQ();
}

/* ══ 결과 ══ */
function showResult() {
  showView('result-view');
  document.getElementById('result-emoji').textContent = score === Q_PER_GAME ? '🏆' : '👏';
  document.getElementById('result-msg').textContent = `${Q_PER_GAME}문제 완료!`;
  document.getElementById('result-detail').textContent = `${Q_PER_GAME}문제 중 ${score}개 정답`;
  document.getElementById('result-retry-btn').onclick = () => startGame(curMode);
}

/* ══ TTS ══ */
function speak(text) {
  if (!ttsOn || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ko-KR'; u.rate = 0.9; u.pitch = 1.05;
  window.speechSynthesis.speak(u);
}

/* ══ 초기화 ══ */
(function init() {
  loadSettings();
  applySettingsUI();
  initPreviews();
  initHeaderIcons();

  const splash = document.getElementById('splash');
  setTimeout(() => {
    splash.classList.add('fade-out');
    setTimeout(() => splash.remove(), 500);
  }, 1400);

  if (localStorage.getItem('slowmath_clock_login')) {
    showView('start-view');
  } else {
    showView('login-view');
  }
})();
</script>
